<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>UAV-VLN 导航监控</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  header { padding: 0 20px; height: 41px; background: #2c3e50; color: white; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  header h1 { font-size: 16px; letter-spacing: 1px; }
  #status-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; background: #e67e22; }
  #status-badge.live { background: #d32f2f; animation: pulse 2s infinite; }
  #status-badge.paused { background: #e67e22; }
  #status-badge.playing { background: #1976d2; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(211,47,47,0.6); } 70% { box-shadow: 0 0 0 8px rgba(211,47,47,0); } }

  .body { display: flex; flex: 1; overflow: hidden; min-height: 0; }

  .resizer { width: 5px; background: #ddd; cursor: col-resize; flex-shrink: 0; transition: background 0.15s; }
  .resizer:hover, .resizer.dragging { background: #1976d2; }

  /* 左侧时间轴 */
  .sidebar { width: 220px; min-width: 120px; max-width: 400px; background: white; display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
  .sidebar-header { padding: 0 14px; background: #f8f9fa; color: #2c3e50; font-size: 13px; font-weight: bold; height: 36px; display: flex; align-items: center; border-bottom: 1px solid #e0e0e0; }
  .timeline-list { flex: 1; overflow-y: auto; padding: 6px; }
  .tl-item { padding: 8px 10px; border-radius: 6px; cursor: pointer; margin-bottom: 4px; border-left: 3px solid transparent; transition: all 0.15s; }
  .tl-item:hover { background: #f5f5f5; }
  .tl-item.active { background: #e3f2fd; border-left-color: #1976d2; }
  .tl-time { font-size: 11px; color: #999; }
  .tl-action { font-size: 13px; font-weight: bold; color: #1976d2; margin: 3px 0; }
  .tl-phase { font-size: 12px; color: #777; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* 中间信息列 */
  .info-col { width: 280px; min-width: 200px; max-width: 420px; display: flex; flex-direction: column; gap: 8px; padding: 0 10px 12px 10px; overflow-y: auto; flex-shrink: 0; background: #f8f9fa; }
  .info-col-header { height: 36px; display: flex; align-items: center; font-size: 13px; font-weight: bold; color: #2c3e50; background: #f8f9fa; margin: 0 -10px; padding: 0 14px; flex-shrink: 0; border-bottom: 1px solid #e0e0e0; }
  .card { background: white; border-radius: 8px; padding: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .card-label { font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: #555; font-weight: bold; margin-bottom: 10px; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .stat { background: #f8f9fa; border-radius: 6px; padding: 8px 10px; }
  .stat .lbl { font-size: 12px; color: #555; margin-bottom: 3px; }
  .stat .val { font-size: 15px; font-weight: bold; color: #1976d2; }
  #action-val { font-size: 20px; font-weight: bold; color: #e67e22; text-align: center; padding: 8px; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 11px; font-weight: bold; }
  .tag.yes { background: #e8f5e9; color: #388e3c; }
  .tag.no  { background: #ffebee; color: #c62828; }

  /* 右侧相机区域 */
  .camera-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 0 12px 12px 12px; gap: 10px; min-width: 200px; }
  .camera-area-header { height: 36px; display: flex; align-items: center; font-size: 13px; font-weight: bold; color: #2c3e50; background: #f0f2f5; margin: 0 -12px; padding: 0 14px; flex-shrink: 0; border-bottom: 1px solid #e0e0e0; }
  .camera-box { flex: 1; background: #000; border-radius: 8px; overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; min-height: 0; }
  #camera-img { max-width: 100%; max-height: 100%; object-fit: contain; }
  #no-img { color: #555; font-size: 13px; }
  .cam-label { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.6); color: white; padding: 3px 8px; border-radius: 4px; font-size: 11px; }

  .controls { display: flex; align-items: center; gap: 10px; background: white; border-radius: 8px; padding: 8px 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); flex-shrink: 0; }
  .btn { border: none; background: #1976d2; color: white; width: 34px; height: 34px; border-radius: 50%; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
  .btn:hover { background: #1565c0; }
  .btn.live-btn { background: #d32f2f; }
  .controls input[type=range] { flex: 1; }
  .frame-cnt { font-size: 12px; font-family: monospace; color: #555; min-width: 55px; text-align: right; }

  .reasoning-box { background: white; border-radius: 8px; padding: 10px 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); flex-shrink: 0; }
  .reasoning-box .card-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #999; font-weight: bold; margin-bottom: 4px; }
  #reasoning-val { font-size: 12px; color: #333; line-height: 1.5; border-left: 3px solid #1976d2; padding-left: 10px; max-height: 60px; overflow-y: auto; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
</style>
</head>
<body>
<header>
  <h1>UAV-VLN 导航监控</h1>
  <div id="status-badge">等待数据...</div>
</header>

<div class="body">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">历史记录</div>
    <div class="timeline-list" id="tl-list"></div>
  </div>

  <div class="resizer" id="resizer1"></div>

  <div class="info-col" id="info-col">
    <div class="info-col-header">导航状态</div>
    <div class="card">
      <div class="card-label">任务指令</div>
      <div id="instruction-val" style="font-size:13px;color:#2c3e50;word-break:break-all;">-</div>
    </div>
    <div class="card">
      <div class="card-label">任务序列</div>
      <div id="task-steps-val" style="font-size:12px;color:#34495e;line-height:1.8;">-</div>
    </div>
    <div class="card">
      <div class="card-label">任务状态</div>
      <div class="stat-grid">
        <div class="stat"><div class="lbl">阶段</div><div class="val" id="phase-val">-</div></div>
        <div class="stat"><div class="lbl">步数</div><div class="val" id="step-val">0</div></div>
        <div class="stat"><div class="lbl">道路方向</div><div class="val" id="road-val">-</div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-label">目标状态</div>
      <div class="stat-grid">
        <div class="stat"><div class="lbl">目标可见</div><div class="val" id="target-vis-val">-</div></div>
        <div class="stat"><div class="lbl">居中</div><div class="val" id="centered-val">-</div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-label">决策指令</div>
      <div id="action-val">-</div>
    </div>
  </div>

  <div class="resizer" id="resizer2"></div>

  <div class="camera-area">
    <div class="camera-area-header">相机视图</div>
    <div class="camera-box">
      <div id="no-img">等待图像...</div>
      <img id="camera-img" style="display:none" alt="俯视图">
      <div class="cam-label">俯视相机</div>
    </div>
    <div class="controls">
      <button class="btn" id="play-btn" onclick="togglePlay()" title="播放/暂停">▶</button>
      <button class="btn live-btn" onclick="goLive()" title="实时">⬤</button>
      <select id="speed-sel" onchange="updateSpeed()" style="padding:4px 8px; border-radius:4px; border:1px solid #ccc;">
        <option value="1000">1 FPS</option>
        <option value="500">2 FPS</option>
        <option value="200">5 FPS</option>
        <option value="100">10 FPS</option>
      </select>
      <input type="range" id="slider" min="0" max="0" value="0" oninput="manualSeek(this.value)">
      <span class="frame-cnt" id="frame-cnt">0/0</span>
    </div>
    <div class="reasoning-box">
      <div class="card-label">大模型分析</div>
      <div id="reasoning-val">等待决策...</div>
    </div>
  </div>
</div>

<script>
const ACTION_LABELS = {
  move_forward:'▲ 前进', move_backward:'▼ 后退',
  move_left:'◀ 左移', move_right:'▶ 右移',
  move_up:'↑ 上升', move_down:'↓ 下降',
  rotate_left:'↺ 左转', rotate_right:'↻ 右转',
  hover:'⏸ 悬停', arrived:'✔ 到达', '-':'-',
};

let history = [], currentIdx = -1, isLive = true, isPlaying = false;
let playTimer = null, speed = 1000;

function makeResizer(resizerId, targetId) {
  const resizer = document.getElementById(resizerId);
  const target = document.getElementById(targetId);
  let startX, startW;
  resizer.addEventListener('mousedown', e => {
    startX = e.clientX; startW = target.offsetWidth;
    resizer.classList.add('dragging');
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    e.preventDefault();
  });
  function onMove(e) {
    const newW = Math.max(120, Math.min(500, startW + e.clientX - startX));
    target.style.width = newW + 'px';
  }
  function onUp() {
    resizer.classList.remove('dragging');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  }
}
makeResizer('resizer1', 'sidebar');
makeResizer('resizer2', 'info-col');

function showFrame(idx) {
  if (idx < 0 || idx >= history.length) return;
  currentIdx = idx;
  const d = history[idx];
  fetch(`/api/frame/${idx}`).then(r => r.json()).then(f => {
    if (f.image) {
      document.getElementById('no-img').style.display = 'none';
      const img = document.getElementById('camera-img');
      img.style.display = 'block';
      img.src = 'data:image/jpeg;base64,' + f.image;
    }
  });
  document.getElementById('phase-val').textContent = d.phase || '-';
  document.getElementById('step-val').textContent = d.step || 0;
  document.getElementById('road-val').textContent = d.road_direction || '-';
  document.getElementById('target-vis-val').innerHTML = d.target_visible
    ? '<span class="tag yes">可见</span>' : '<span class="tag no">未见</span>';
  document.getElementById('centered-val').innerHTML = d.centered
    ? '<span class="tag yes">是</span>' : '<span class="tag no">否</span>';
  document.getElementById('action-val').textContent = ACTION_LABELS[d.action] || d.action || '-';
  document.getElementById('reasoning-val').textContent = d.reasoning || '-';
  const slider = document.getElementById('slider');
  slider.max = history.length - 1;
  slider.value = idx;
  document.getElementById('frame-cnt').textContent = `${idx+1}/${history.length}`;
  document.querySelectorAll('.tl-item').forEach((el, i) => {
    el.classList.toggle('active', history.length - 1 - i === idx);
  });
}

function updateTimeline() {
  const list = document.getElementById('tl-list');
  list.innerHTML = '';
  history.slice().reverse().forEach((d, ri) => {
    const realIdx = history.length - 1 - ri;
    const el = document.createElement('div');
    el.className = 'tl-item' + (realIdx === currentIdx ? ' active' : '');
    el.onclick = () => manualSeek(realIdx);
    el.innerHTML = `<div class="tl-time">${d.time_str} #${realIdx}</div>
      <div class="tl-action">${ACTION_LABELS[d.action] || d.action || '-'}</div>
      <div class="tl-phase">${d.phase || '-'}</div>`;
    list.appendChild(el);
  });
}

function manualSeek(idx) { stopPlay(); isLive = false; updateUI(); showFrame(parseInt(idx)); }
function togglePlay() {
  if (isLive) { isLive = false; if (currentIdx >= history.length-1) currentIdx = 0; startPlay(); }
  else { isPlaying ? stopPlay() : startPlay(); }
  updateUI();
}
function goLive() { stopPlay(); isLive = true; if (history.length > 0) showFrame(history.length - 1); updateUI(); }
function startPlay() {
  isPlaying = true;
  if (playTimer) clearInterval(playTimer);
  playTimer = setInterval(() => {
    if (currentIdx < history.length - 1) showFrame(currentIdx + 1);
    else { stopPlay(); updateUI(); }
  }, speed);
}
function stopPlay() { isPlaying = false; if (playTimer) { clearInterval(playTimer); playTimer = null; } }
function updateSpeed() { speed = parseInt(document.getElementById('speed-sel').value); if (isPlaying) startPlay(); }
function updateUI() {
  const badge = document.getElementById('status-badge');
  const playBtn = document.getElementById('play-btn');
  if (isLive) { badge.textContent = '实时追踪'; badge.className = 'live'; playBtn.textContent = '▶'; }
  else if (isPlaying) { badge.textContent = '回放中'; badge.className = 'playing'; playBtn.textContent = '⏸'; }
  else { badge.textContent = '已暂停'; badge.className = 'paused'; playBtn.textContent = '▶'; }
}
async function fetchData() {
  try {
    const res = await fetch('/api/data');
    const data = await res.json();
    if (data.length > history.length) {
      history = data;
      updateTimeline();
      if (isLive) showFrame(history.length - 1);
      else document.getElementById('frame-cnt').textContent = `${currentIdx+1}/${history.length}`;
      if (history.length === 1) goLive();
    }
  } catch(e) {}
  try {
    const ti = await fetch('/api/task_info').then(r => r.json());
    document.getElementById('instruction-val').textContent = ti.instruction || '-';
    const steps = ti.steps || [];
    document.getElementById('task-steps-val').innerHTML = steps.length
      ? steps.map((s, i) => `<span style="color:#7ec8e3">${i+1}.</span> ${s}`).join('<br>')
      : '-';
  } catch(e) {}
}
updateUI();
setInterval(fetchData, 1000);
</script>
</body>
</html>
