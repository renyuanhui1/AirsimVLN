<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>UAV-VLN 导航监控</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  header { padding: 10px 20px; background: #2c3e50; color: white; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 16px; letter-spacing: 1px; }
  #status-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; background: #e67e22; }
  #status-badge.live { background: #d32f2f; animation: pulse 2s infinite; }
  #status-badge.paused { background: #e67e22; }
  #status-badge.playing { background: #1976d2; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(211,47,47,0.6); } 70% { box-shadow: 0 0 0 8px rgba(211,47,47,0); } }

  .body { display: flex; flex: 1; overflow: hidden; gap: 0; }

  /* 左侧时间轴 */
  .sidebar { width: 220px; background: white; display: flex; flex-direction: column; border-right: 1px solid #ddd; }
  .sidebar-header { padding: 12px 16px; background: #2c3e50; color: white; font-size: 13px; font-weight: bold; }
  .timeline-list { flex: 1; overflow-y: auto; padding: 6px; }
  .tl-item { padding: 8px 10px; border-radius: 6px; cursor: pointer; margin-bottom: 4px; border-left: 3px solid transparent; transition: all 0.15s; }
  .tl-item:hover { background: #f5f5f5; }
  .tl-item.active { background: #e3f2fd; border-left-color: #1976d2; }
  .tl-time { font-size: 10px; color: #999; }
  .tl-action { font-size: 12px; font-weight: bold; color: #1976d2; margin: 2px 0; }
  .tl-phase { font-size: 11px; color: #777; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* 主区域 */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 12px; gap: 10px; }

  .top-row { display: flex; gap: 10px; flex: 1; min-height: 0; }

  /* 相机 */
  .camera-box { flex: 1.3; background: #000; border-radius: 8px; overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; }
  #camera-img { max-width: 100%; max-height: 100%; object-fit: contain; }
  #no-img { color: #555; font-size: 13px; }
  .cam-label { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.6); color: white; padding: 3px 8px; border-radius: 4px; font-size: 11px; }

  /* 右侧信息 */
  .info-col { flex: 1; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
  .card { background: white; border-radius: 8px; padding: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .card-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #999; font-weight: bold; margin-bottom: 6px; }
  .card-value { font-size: 13px; color: #333; line-height: 1.5; }

  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .stat { background: #f8f9fa; border-radius: 6px; padding: 8px; }
  .stat .lbl { font-size: 10px; color: #999; margin-bottom: 2px; }
  .stat .val { font-size: 14px; font-weight: bold; color: #1976d2; }

  #action-val { font-size: 20px; font-weight: bold; color: #e67e22; text-align: center; padding: 8px; }

  .tag { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 11px; font-weight: bold; }
  .tag.yes { background: #e8f5e9; color: #388e3c; }
  .tag.no  { background: #ffebee; color: #c62828; }

  /* 控制栏 */
  .controls { display: flex; align-items: center; gap: 10px; background: white; border-radius: 8px; padding: 8px 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .btn { border: none; background: #1976d2; color: white; width: 34px; height: 34px; border-radius: 50%; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
  .btn:hover { background: #1565c0; }
  .btn.live-btn { background: #d32f2f; }
  input[type=range] { flex: 1; }
  .frame-cnt { font-size: 12px; font-family: monospace; color: #555; min-width: 55px; text-align: right; }

  /* 底部分析 */
  .bottom-row { display: flex; gap: 10px; }
  .reasoning-box { flex: 1; background: white; border-radius: 8px; padding: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .reasoning-box .card-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #999; font-weight: bold; margin-bottom: 6px; }
  #reasoning-val { font-size: 13px; color: #333; line-height: 1.6; border-left: 3px solid #1976d2; padding-left: 10px; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
</style>
</head>
<body>
<header>
  <h1>UAV-VLN 导航监控</h1>
  <div id="status-badge">等待数据...</div>
</header>

<div class="body">
  <!-- 时间轴 -->
  <div class="sidebar">
    <div class="sidebar-header">历史记录</div>
    <div class="timeline-list" id="tl-list"></div>
  </div>

  <!-- 主区域 -->
  <div class="main">
    <div class="top-row">
      <!-- 相机 -->
      <div class="camera-box">
        <div id="no-img">等待图像...</div>
        <img id="camera-img" style="display:none" alt="俯视图">
        <div class="cam-label">俯视相机</div>
      </div>

      <!-- 信息列 -->
      <div class="info-col">
        <div class="card">
          <div class="card-label">任务状态</div>
          <div class="stat-grid">
            <div class="stat"><div class="lbl">阶段</div><div class="val" id="phase-val">-</div></div>
            <div class="stat"><div class="lbl">步数</div><div class="val" id="step-val">0</div></div>
            <div class="stat"><div class="lbl">高度</div><div class="val" id="alt-val">0.0m</div></div>
            <div class="stat"><div class="lbl">道路方向</div><div class="val" id="road-val">-</div></div>
          </div>
        </div>

        <div class="card">
          <div class="card-label">目标状态</div>
          <div class="stat-grid">
            <div class="stat"><div class="lbl">目标可见</div><div class="val" id="target-vis-val">-</div></div>
            <div class="stat"><div class="lbl">目标位置</div><div class="val" id="target-off-val">-</div></div>
            <div class="stat"><div class="lbl">距离</div><div class="val" id="dist-val">-</div></div>
            <div class="stat"><div class="lbl">居中</div><div class="val" id="centered-val">-</div></div>
          </div>
        </div>

        <div class="card">
          <div class="card-label">决策指令</div>
          <div id="action-val">-</div>
        </div>
      </div>
    </div>

    <!-- 控制栏 -->
    <div class="controls">
      <button class="btn" id="play-btn" onclick="togglePlay()" title="播放/暂停">▶</button>
      <button class="btn live-btn" onclick="goLive()" title="实时">⬤</button>
      <select id="speed-sel" onchange="updateSpeed()" style="padding:4px 8px; border-radius:4px; border:1px solid #ccc;">
        <option value="1000">1 FPS</option>
        <option value="500">2 FPS</option>
        <option value="200">5 FPS</option>
        <option value="100">10 FPS</option>
      </select>
      <input type="range" id="slider" min="0" max="0" value="0" oninput="manualSeek(this.value)">
      <span class="frame-cnt" id="frame-cnt">0/0</span>
    </div>

    <!-- 分析 -->
    <div class="bottom-row">
      <div class="reasoning-box">
        <div class="card-label">大模型分析</div>
        <div id="reasoning-val">等待决策...</div>
      </div>
    </div>
  </div>
</div>

<script>
const ACTION_LABELS = {
  move_forward:'▲ 前进', move_backward:'▼ 后退',
  move_left:'◀ 左移', move_right:'▶ 右移',
  move_up:'↑ 上升', move_down:'↓ 下降',
  rotate_left:'↺ 左转', rotate_right:'↻ 右转',
  hover:'⏸ 悬停', arrived:'✔ 到达', '-':'-',
};

let history = [], currentIdx = -1, isLive = true, isPlaying = false;
let playTimer = null, speed = 1000;

function showFrame(idx) {
  if (idx < 0 || idx >= history.length) return;
  currentIdx = idx;
  const d = history[idx];

  // 图像（需单独请求）
  fetch(`/api/frame/${idx}`).then(r => r.json()).then(f => {
    if (f.image) {
      document.getElementById('no-img').style.display = 'none';
      const img = document.getElementById('camera-img');
      img.style.display = 'block';
      img.src = 'data:image/jpeg;base64,' + f.image;
    }
  });

  document.getElementById('phase-val').textContent = d.phase || '-';
  document.getElementById('step-val').textContent = d.step || 0;
  document.getElementById('alt-val').textContent = (d.altitude||0).toFixed(1) + 'm';
  document.getElementById('road-val').textContent = d.road_direction || '-';

  document.getElementById('target-vis-val').innerHTML = d.target_visible
    ? '<span class="tag yes">可见</span>' : '<span class="tag no">未见</span>';
  document.getElementById('target-off-val').textContent = d.target_offset || '-';
  document.getElementById('dist-val').textContent = d.distance_bucket || '-';
  document.getElementById('centered-val').innerHTML = d.centered
    ? '<span class="tag yes">是</span>' : '<span class="tag no">否</span>';

  document.getElementById('action-val').textContent = ACTION_LABELS[d.action] || d.action || '-';
  document.getElementById('reasoning-val').textContent = d.reasoning || '-';

  const slider = document.getElementById('slider');
  slider.max = history.length - 1;
  slider.value = idx;
  document.getElementById('frame-cnt').textContent = `${idx+1}/${history.length}`;

  // 时间轴高亮
  document.querySelectorAll('.tl-item').forEach((el, i) => {
    const realIdx = history.length - 1 - i;
    el.classList.toggle('active', realIdx === idx);
  });
}

function updateTimeline() {
  const list = document.getElementById('tl-list');
  list.innerHTML = '';
  history.slice().reverse().forEach((d, ri) => {
    const realIdx = history.length - 1 - ri;
    const el = document.createElement('div');
    el.className = 'tl-item' + (realIdx === currentIdx ? ' active' : '');
    el.onclick = () => manualSeek(realIdx);
    el.innerHTML = `<div class="tl-time">${d.time_str} #${realIdx}</div>
      <div class="tl-action">${ACTION_LABELS[d.action] || d.action || '-'}</div>
      <div class="tl-phase">${d.phase || '-'}</div>`;
    list.appendChild(el);
  });
}

function manualSeek(idx) {
  stopPlay(); isLive = false; updateUI();
  showFrame(parseInt(idx));
}

function togglePlay() {
  if (isLive) { isLive = false; if (currentIdx >= history.length-1) currentIdx = 0; startPlay(); }
  else { isPlaying ? stopPlay() : startPlay(); }
  updateUI();
}

function goLive() {
  stopPlay(); isLive = true;
  if (history.length > 0) showFrame(history.length - 1);
  updateUI();
}

function startPlay() {
  isPlaying = true;
  if (playTimer) clearInterval(playTimer);
  playTimer = setInterval(() => {
    if (currentIdx < history.length - 1) showFrame(currentIdx + 1);
    else { stopPlay(); updateUI(); }
  }, speed);
}

function stopPlay() {
  isPlaying = false;
  if (playTimer) { clearInterval(playTimer); playTimer = null; }
}

function updateSpeed() {
  speed = parseInt(document.getElementById('speed-sel').value);
  if (isPlaying) startPlay();
}

function updateUI() {
  const badge = document.getElementById('status-badge');
  const playBtn = document.getElementById('play-btn');
  if (isLive) {
    badge.textContent = '实时追踪'; badge.className = 'live';
    playBtn.textContent = '▶';
  } else if (isPlaying) {
    badge.textContent = '回放中'; badge.className = 'playing';
    playBtn.textContent = '⏸';
  } else {
    badge.textContent = '已暂停'; badge.className = 'paused';
    playBtn.textContent = '▶';
  }
}

async function fetchData() {
  try {
    const res = await fetch('/api/data');
    const data = await res.json();
    if (data.length > history.length) {
      history = data;
      updateTimeline();
      if (isLive) showFrame(history.length - 1);
      else document.getElementById('frame-cnt').textContent = `${currentIdx+1}/${history.length}`;
      if (history.length === 1) { goLive(); }
    }
  } catch(e) {}
}

updateUI();
setInterval(fetchData, 1000);
</script>
</body>
</html>
